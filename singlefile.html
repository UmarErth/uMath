<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Gaming</title>
</head>
<body>

    <!-- CACHE-BUSTING AUTO ENGINE LOAD -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const script = document.createElement('script');
            // Appends a unique current time counter to force an instant fresh file download
            script.src = 'https://cdn.jsdelivr.net/gh/UmarErth/uMath/loader.js?v=' + Date.now();
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
